tenable:
  base_url: "https://cloud.tenable.com"
  # access_key / secret_key are loaded from secrets.yaml

crowdstrike:
  base_url: "https://api.us-2.crowdstrike.com"
  # access_key / secret_key are loaded from secrets.yaml

reporting:
  days_last_seen: 30
  vuln_published_older_than_days: 30
  # true  = only flag remote/no-auth vulns that also have a known exploit (lower noise, recommended)
  # false = flag all network-accessible, no-auth vulns regardless of exploit availability (broader coverage)
  require_exploit_for_remote_no_auth: true
  retention_days: 540

sites:
  - key: "Aplha-Site"
    label: "Site A"
  - key: "Bravo-Site"
    label: "Site B"

ungrouped_label: "Ungrouped"

tags:
  site_category: "Sites"
  asset_type_category: "AssetType"
  internet_values: ["InternetFacing"]
  server_values: ["Server"]
  workstation_values: ["Workstation"]

database:
  engine: "postgres"
  host: "127.0.0.1"
  port: 5432
  name: "tenable_trends"
  # user / password will be loaded from secrets.yaml

# Path to your secrets file (relative to this config file)
secrets_file: "secrets.yaml"
